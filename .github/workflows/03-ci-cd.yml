name: 03-ci-cd

# main 에 머지되면 실행되며, monorepo 패턴으로 동작한다:
#   - 각 컴포넌트 폴더의 last-touch 커밋 SHA 를 그 컴포넌트의 이미지 태그로 사용
#   - 그 태그 이미지가 이미 Artifact Registry 에 있으면 빌드 스킵
#   - 변경된 컴포넌트만 새 이미지를 빌드/푸시
#   - 컴파일 시 컴포넌트별 태그를 환경변수로 주입 → 변경되지 않은 컴포넌트는
#     이전 SHA 의 이미지를 그대로 참조
#   - 컴파일된 YAML 을 KFP 템플릿 레지스트리에 항상 업로드 (현재 구성 스냅샷)
#
# 사전 설정이 필요한 repository variables:
#     GCP_PROJECT           — GCP 프로젝트 ID
#     GCP_REGION            — Docker / pipeline-root 용 (예: us-central1)
#     PIPELINE_ROOT         — gs://<bucket>/pipeline-root
#     AR_REPO               — Docker 이미지용 AR repo (예: vertex-ci-images)
#     KFP_HOST              — KFP 템플릿 host (예: https://us-kfp.pkg.dev/<project>/<repo>)
#     WIF_PROVIDER          — projects/<num>/locations/global/workloadIdentityPools/<pool>/providers/<provider>
#     WIF_SERVICE_ACCOUNT   — AR 푸시 + 템플릿 업로드 권한 SA

on:
  push:
    branches: [main]
    paths:
      - "03-ci-cd/**"
      - ".github/workflows/03-ci-cd.yml"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch: {}

env:
  PIPELINE_DIR: 03-ci-cd
  IMAGE_REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/${{ vars.AR_REPO }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          # last-touch 커밋을 찾으려면 전체 history 가 필요하다.
          fetch-depth: 0

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve per-component image tags (last-touch SHA)
        id: tags
        run: |
          set -euo pipefail
          for comp in data-preparation train evaluation; do
            # 해당 폴더에 영향을 준 가장 최근 커밋의 short SHA
            sha=$(git log -1 --format=%h -- "${PIPELINE_DIR}/${comp}/")
            if [[ -z "$sha" ]]; then
              echo "::error::could not resolve SHA for ${comp}"
              exit 1
            fi
            key=$(echo "$comp" | tr '-' '_')
            echo "tag_${key}=${sha}" >> "$GITHUB_OUTPUT"
            echo "${comp}: ${sha}"
          done

      - name: Build & push only changed components
        env:
          DATA_PREP_TAG: ${{ steps.tags.outputs.tag_data_preparation }}
          TRAIN_TAG: ${{ steps.tags.outputs.tag_train }}
          EVAL_TAG: ${{ steps.tags.outputs.tag_evaluation }}
        run: |
          set -euo pipefail
          declare -A TAG_MAP=(
            [data-preparation]="$DATA_PREP_TAG"
            [train]="$TRAIN_TAG"
            [evaluation]="$EVAL_TAG"
          )
          for comp in data-preparation train evaluation; do
            tag="${TAG_MAP[$comp]}"
            image_path="${IMAGE_REGISTRY}/${comp}"
            full="${image_path}:${tag}"

            # 같은 태그가 이미 푸시되어 있으면 빌드 생략
            if gcloud artifacts docker tags list "${image_path}" \
                 --filter="tag=${tag}" --format="value(tag)" \
                 --project="${{ vars.GCP_PROJECT }}" 2>/dev/null \
                 | grep -qx "${tag}"; then
              echo "::notice::skip ${full} (already exists in AR)"
              continue
            fi

            echo "::group::build ${full}"
            docker buildx build \
              --push \
              --tag "${full}" \
              "${PIPELINE_DIR}/${comp}"
            echo "::endgroup::"
          done

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install python dependencies
        run: uv sync --frozen

      - name: Compile pipeline with per-component tags
        env:
          DATA_PREP_TAG: ${{ steps.tags.outputs.tag_data_preparation }}
          TRAIN_TAG: ${{ steps.tags.outputs.tag_train }}
          EVAL_TAG: ${{ steps.tags.outputs.tag_evaluation }}
        run: uv run python ${PIPELINE_DIR}/pipeline.py

      - name: Upload pipeline template to KFP registry
        env:
          KFP_HOST: ${{ vars.KFP_HOST }}
          TEMPLATE_PATH: ${{ env.PIPELINE_DIR }}/ci-cd-pipeline.yaml
          # 워크플로우 실행 SHA + latest 두 개 태그로 등록
          TAGS: ${{ github.sha }},latest
        run: uv run python ${PIPELINE_DIR}/upload_template.py
