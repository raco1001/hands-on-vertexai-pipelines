# PIPELINE DEFINITION
# Name: three-component-demo
# Description: function / container / after 세 가지 패턴을 보여주는 예제
# Inputs:
#    message: str [Default: 'done']
#    multiplier: int [Default: 3.0]
#    num_rows: int [Default: 100.0]
components:
  comp-generate-data:
    executorLabel: exec-generate-data
    inputDefinitions:
      parameters:
        num_rows:
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        output_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
  comp-notify:
    executorLabel: exec-notify
    inputDefinitions:
      parameters:
        message:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-process-data:
    executorLabel: exec-process-data
    inputDefinitions:
      artifacts:
        input_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        multiplier:
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        processed_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
deploymentSpec:
  executors:
    exec-generate-data:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - generate_data
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pandas==2.2.2'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef generate_data(\n    num_rows: int,\n    output_dataset: Output[Dataset],\n\
          ) -> str:\n    \"\"\"\uC784\uC758\uC758 CSV \uB370\uC774\uD130\uB97C \uB9CC\
          \uB4E4\uC5B4 Dataset \uC544\uD2F0\uD329\uD2B8\uB85C \uC800\uC7A5\uD55C\uB2E4\
          .\"\"\"\n    import pandas as pd\n\n    df = pd.DataFrame(\n        {\"\
          id\": range(num_rows), \"value\": [i * 2 for i in range(num_rows)]}\n  \
          \  )\n    df.to_csv(output_dataset.path, index=False)\n    output_dataset.metadata[\"\
          num_rows\"] = num_rows\n    return output_dataset.path\n\n"
        image: python:3.12-slim
    exec-notify:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - notify
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef notify(message: str) -> str:\n    print(f\"[notify] pipeline\
          \ finished: {message}\")\n    return message\n\n"
        image: python:3.12-slim
    exec-process-data:
      container:
        args:
        - echo 'processing '$0' with multiplier='$1;mkdir -p $(dirname $2);awk -F','
          -v m=$1 'NR==1{print $0} NR>1{print $1","$2*m}' $0 > $2
        - '{{$.inputs.artifacts[''input_dataset''].path}}'
        - '{{$.inputs.parameters[''multiplier'']}}'
        - '{{$.outputs.artifacts[''processed_dataset''].path}}'
        command:
        - sh
        - -c
        image: busybox:stable
pipelineInfo:
  description: "function / container / after \uC138 \uAC00\uC9C0 \uD328\uD134\uC744\
    \ \uBCF4\uC5EC\uC8FC\uB294 \uC608\uC81C"
  name: three-component-demo
root:
  dag:
    tasks:
      generate-data:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-generate-data
        inputs:
          parameters:
            num_rows:
              componentInputParameter: num_rows
        taskInfo:
          name: generate-data
      notify:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-notify
        dependentTasks:
        - process-data
        inputs:
          parameters:
            message:
              componentInputParameter: message
        taskInfo:
          name: notify
      process-data:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-process-data
        dependentTasks:
        - generate-data
        inputs:
          artifacts:
            input_dataset:
              taskOutputArtifact:
                outputArtifactKey: output_dataset
                producerTask: generate-data
          parameters:
            multiplier:
              componentInputParameter: multiplier
        taskInfo:
          name: process-data
  inputDefinitions:
    parameters:
      message:
        defaultValue: done
        isOptional: true
        parameterType: STRING
      multiplier:
        defaultValue: 3.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      num_rows:
        defaultValue: 100.0
        isOptional: true
        parameterType: NUMBER_INTEGER
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
