# PIPELINE DEFINITION
# Name: ci-cd-cifar10
# Description: data-prep / train / eval 3단계 CIFAR-10 CNN 파이프라인
# Inputs:
#    batch_size: int [Default: 128.0]
#    cpu_eval: str [Default: '2']
#    cpu_prep: str [Default: '2']
#    cpu_train: str [Default: '4']
#    epochs: int [Default: 3.0]
#    lr: float [Default: 0.001]
#    memory_eval: str [Default: '8G']
#    memory_prep: str [Default: '8G']
#    memory_train: str [Default: '16G']
components:
  comp-data-preparation:
    executorLabel: exec-data-preparation
    outputDefinitions:
      artifacts:
        test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        train_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-evaluation:
    executorLabel: exec-evaluation
    inputDefinitions:
      artifacts:
        model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        test_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
  comp-train:
    executorLabel: exec-train
    inputDefinitions:
      artifacts:
        train_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        batch_size:
          parameterType: NUMBER_INTEGER
        epochs:
          parameterType: NUMBER_INTEGER
        lr:
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
deploymentSpec:
  executors:
    exec-data-preparation:
      container:
        args:
        - --train-output
        - '{{$.outputs.artifacts[''train_dataset''].path}}'
        - --test-output
        - '{{$.outputs.artifacts[''test_dataset''].path}}'
        command:
        - python
        - main.py
        image: gcr.io/test-project/data-preparation:abc1234
        resources:
          resourceCpuLimit: '{{$.inputs.parameters[''pipelinechannel--cpu_prep'']}}'
          resourceMemoryLimit: '{{$.inputs.parameters[''pipelinechannel--memory_prep'']}}'
    exec-evaluation:
      container:
        args:
        - --test-input
        - '{{$.inputs.artifacts[''test_dataset''].path}}'
        - --model-input
        - '{{$.inputs.artifacts[''model''].path}}'
        - --metrics-output
        - '{{$.outputs.artifacts[''metrics''].path}}'
        command:
        - python
        - main.py
        image: gcr.io/test-project/evaluation:abc1234
        resources:
          resourceCpuLimit: '{{$.inputs.parameters[''pipelinechannel--cpu_eval'']}}'
          resourceMemoryLimit: '{{$.inputs.parameters[''pipelinechannel--memory_eval'']}}'
    exec-train:
      container:
        args:
        - --train-input
        - '{{$.inputs.artifacts[''train_dataset''].path}}'
        - --model-output
        - '{{$.outputs.artifacts[''model''].path}}'
        - --epochs
        - '{{$.inputs.parameters[''epochs'']}}'
        - --batch-size
        - '{{$.inputs.parameters[''batch_size'']}}'
        - --lr
        - '{{$.inputs.parameters[''lr'']}}'
        command:
        - python
        - main.py
        image: gcr.io/test-project/train:abc1234
        resources:
          resourceCpuLimit: '{{$.inputs.parameters[''pipelinechannel--cpu_train'']}}'
          resourceMemoryLimit: '{{$.inputs.parameters[''pipelinechannel--memory_train'']}}'
pipelineInfo:
  description: "data-prep / train / eval 3\uB2E8\uACC4 CIFAR-10 CNN \uD30C\uC774\uD504\
    \uB77C\uC778"
  name: ci-cd-cifar10
root:
  dag:
    tasks:
      data-preparation:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-data-preparation
        inputs:
          parameters:
            cpu_limit:
              runtimeValue:
                constant: '{{$.inputs.parameters[''pipelinechannel--cpu_prep'']}}'
            memory_limit:
              runtimeValue:
                constant: '{{$.inputs.parameters[''pipelinechannel--memory_prep'']}}'
            pipelinechannel--cpu_prep:
              componentInputParameter: cpu_prep
            pipelinechannel--memory_prep:
              componentInputParameter: memory_prep
        taskInfo:
          name: data-preparation
      evaluation:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-evaluation
        dependentTasks:
        - data-preparation
        - train
        inputs:
          artifacts:
            model:
              taskOutputArtifact:
                outputArtifactKey: model
                producerTask: train
            test_dataset:
              taskOutputArtifact:
                outputArtifactKey: test_dataset
                producerTask: data-preparation
          parameters:
            cpu_limit:
              runtimeValue:
                constant: '{{$.inputs.parameters[''pipelinechannel--cpu_eval'']}}'
            memory_limit:
              runtimeValue:
                constant: '{{$.inputs.parameters[''pipelinechannel--memory_eval'']}}'
            pipelinechannel--cpu_eval:
              componentInputParameter: cpu_eval
            pipelinechannel--memory_eval:
              componentInputParameter: memory_eval
        taskInfo:
          name: evaluation
      train:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train
        dependentTasks:
        - data-preparation
        inputs:
          artifacts:
            train_dataset:
              taskOutputArtifact:
                outputArtifactKey: train_dataset
                producerTask: data-preparation
          parameters:
            batch_size:
              componentInputParameter: batch_size
            cpu_limit:
              runtimeValue:
                constant: '{{$.inputs.parameters[''pipelinechannel--cpu_train'']}}'
            epochs:
              componentInputParameter: epochs
            lr:
              componentInputParameter: lr
            memory_limit:
              runtimeValue:
                constant: '{{$.inputs.parameters[''pipelinechannel--memory_train'']}}'
            pipelinechannel--cpu_train:
              componentInputParameter: cpu_train
            pipelinechannel--memory_train:
              componentInputParameter: memory_train
        taskInfo:
          name: train
  inputDefinitions:
    parameters:
      batch_size:
        defaultValue: 128.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      cpu_eval:
        defaultValue: '2'
        isOptional: true
        parameterType: STRING
      cpu_prep:
        defaultValue: '2'
        isOptional: true
        parameterType: STRING
      cpu_train:
        defaultValue: '4'
        isOptional: true
        parameterType: STRING
      epochs:
        defaultValue: 3.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      lr:
        defaultValue: 0.001
        isOptional: true
        parameterType: NUMBER_DOUBLE
      memory_eval:
        defaultValue: 8G
        isOptional: true
        parameterType: STRING
      memory_prep:
        defaultValue: 8G
        isOptional: true
        parameterType: STRING
      memory_train:
        defaultValue: 16G
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
